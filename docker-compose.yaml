services:
  task-service:
    build:
      context: .
      dockerfile: task-service/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://tasks:taskspass@db:5432/tasks?sslmode=disable
      JWT_SECRET: your-secret-key
      HTTP_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      NOTIFICATION_ADDR: notification-service:50052
    depends_on:
      - db
      - redis
      - notification-service

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8081:8081"
      - "50052:50052"

  db:
    container_name: tasks-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: taskspass
    ports:
      - "5432:5432"
    volumes:
      - tasks_pgdata:/var/lib/postgresql/data
      - ./task-service/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  redis-ui:
    image: rediscommander/redis-commander
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  tasks_pgdata: