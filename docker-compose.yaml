services:
  db:
    image: postgres:16
    container_name: tasks-postgres
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: taskspass
    ports:
      - "5432:5432"
    volumes:
      - tasks_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

volumes:
  tasks_pgdata: